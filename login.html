<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stockia — Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primario: #1F3A8A;
      --primario-hover: #162d6e;
      --secundario: #3B82F6;
      --acento: #10B981;
      --fondo: #F3F4F6;
      --texto: #111827;
      --texto-suave: #6B7280;
      --borde: #E5E7EB;
      --error: #EF4444;
      --radio: 12px;
      --radio-sm: 8px;
      --transicion: 0.2s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--fondo);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Fondo decorativo */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(31,58,138,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -200px; right: -200px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(16,185,129,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-contenedor {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
    }

    /* Logo area */
    .login-logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-svg-area {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--primario);
      border-radius: 20px;
      padding: 18px 32px;
      margin-bottom: 12px;
      box-shadow: 0 8px 24px rgba(31,58,138,0.3);
    }

    .login-tagline {
      font-size: 16px;
      color: var(--texto-suave);
      font-weight: 500;
    }

    /* Tarjeta de login */
    .login-card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      border: 1px solid var(--borde);
    }

    .login-titulo {
      font-size: 24px;
      font-weight: 800;
      color: var(--texto);
      margin-bottom: 6px;
    }

    .login-subtitulo {
      font-size: 15px;
      color: var(--texto-suave);
      margin-bottom: 32px;
    }

    .form-grupo { margin-bottom: 20px; }

    .form-label {
      display: block;
      font-size: 15px;
      font-weight: 600;
      color: var(--texto);
      margin-bottom: 8px;
    }

    .input-contenedor { position: relative; }

    .input-icono {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      pointer-events: none;
    }

    .form-input {
      width: 100%;
      padding: 15px 16px 15px 46px;
      border: 2px solid var(--borde);
      border-radius: var(--radio-sm);
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      color: var(--texto);
      background: white;
      transition: var(--transicion);
      outline: none;
    }

    .form-input:focus {
      border-color: var(--secundario);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .form-input.error { border-color: var(--error); }
    .form-error {
      color: var(--error);
      font-size: 13px;
      margin-top: 6px;
      display: none;
    }
    .form-error.visible { display: block; }

    .btn-login {
      width: 100%;
      padding: 16px;
      background: var(--primario);
      color: white;
      border: none;
      border-radius: var(--radio-sm);
      font-size: 17px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: var(--transicion);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }

    .btn-login:hover:not(:disabled) { background: var(--primario-hover); transform: translateY(-1px); }
    .btn-login:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Alerta de error general */
    .alerta-login {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: var(--radio-sm);
      padding: 14px 16px;
      font-size: 14px;
      color: #DC2626;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
    }
    .alerta-login.visible { display: flex; }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--texto-suave);
    }

    /* Indicador de versión */
    .version-badge {
      position: fixed;
      bottom: 16px;
      right: 16px;
      font-size: 12px;
      color: var(--texto-suave);
      background: white;
      border: 1px solid var(--borde);
      padding: 4px 10px;
      border-radius: 20px;
    }
  </style>
</head>
<body>

  <div class="login-contenedor">
    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-svg-area">
        <!-- Logo SVG inline -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" width="200" height="44">
          <text x="0" y="36" font-family="Inter,sans-serif" font-weight="800" font-size="38" fill="white" letter-spacing="-1">St</text>
          <!-- "o" como caja -->
          <g transform="translate(52, 6)">
            <rect x="0" y="11" width="24" height="17" rx="2.5" fill="#10B981"/>
            <path d="M0 11 L4.5 4 L19.5 4 L24 11 Z" fill="#059669"/>
            <line x1="0" y1="11" x2="24" y2="11" stroke="white" stroke-width="1.2" stroke-opacity="0.4"/>
            <line x1="12" y1="11" x2="12" y2="28" stroke="white" stroke-width="1" stroke-opacity="0.3"/>
          </g>
          <text x="80" y="36" font-family="Inter,sans-serif" font-weight="800" font-size="38" fill="white" letter-spacing="-1">ckia</text>
        </svg>
      </div>
      <div class="login-tagline">Tu inventario, bajo control.</div>
    </div>

    <!-- Card de login -->
    <div class="login-card">
      <h1 class="login-titulo">👋 Bienvenido</h1>
      <p class="login-subtitulo">Ingresá con tu cuenta para continuar</p>

      <!-- Alerta de error -->
      <div class="alerta-login" id="alertaLogin">
        <span>⚠️</span>
        <span id="alertaLoginTexto"></span>
      </div>

      <form id="formLogin" novalidate>
        <div class="form-grupo">
          <label class="form-label" for="email">📧 Correo electrónico</label>
          <div class="input-contenedor">
            <input
              type="email"
              id="email"
              class="form-input"
              placeholder="tu@email.com"
              autocomplete="email"
              inputmode="email"
              required
            >
          </div>
          <div class="form-error" id="errorEmail">Por favor ingresá un email válido.</div>
        </div>

        <div class="form-grupo">
          <label class="form-label" for="password">🔒 Contraseña</label>
          <div class="input-contenedor">
            <input
              type="password"
              id="password"
              class="form-input"
              placeholder="Tu contraseña"
              autocomplete="current-password"
              required
            >
          </div>
          <div class="form-error" id="errorPassword">Por favor ingresá tu contraseña.</div>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">
          <span id="btnLoginTexto">Ingresar al sistema</span>
        </button>
      </form>

      <div class="login-footer">
        ¿Problemas para ingresar? Contactá al administrador.
      </div>
    </div>
  </div>

  <div class="version-badge">Stockia v1.0</div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ⚠️ REEMPLAZAR CON TUS CREDENCIALES
    const SUPABASE_URL = 'https://TU_PROYECTO.supabase.co';
    const SUPABASE_ANON_KEY = 'TU_ANON_KEY';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Si ya hay sesión, redirigir
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = '/dashboard.html';
    });

    const form = document.getElementById('formLogin');
    const btnLogin = document.getElementById('btnLogin');
    const btnTexto = document.getElementById('btnLoginTexto');
    const alerta = document.getElementById('alertaLogin');
    const alertaTexto = document.getElementById('alertaLoginTexto');

    function mostrarAlertaLogin(msg) {
      alertaTexto.textContent = msg;
      alerta.classList.add('visible');
    }

    function ocultarAlertaLogin() {
      alerta.classList.remove('visible');
    }

    function setLoading(cargando) {
      btnLogin.disabled = cargando;
      btnTexto.innerHTML = cargando
        ? '<div class="spinner"></div>'
        : 'Ingresar al sistema';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      ocultarAlertaLogin();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Validaciones
      let valido = true;

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('errorEmail').classList.add('visible');
        document.getElementById('email').classList.add('error');
        valido = false;
      } else {
        document.getElementById('errorEmail').classList.remove('visible');
        document.getElementById('email').classList.remove('error');
      }

      if (!password) {
        document.getElementById('errorPassword').classList.add('visible');
        document.getElementById('password').classList.add('error');
        valido = false;
      } else {
        document.getElementById('errorPassword').classList.remove('visible');
        document.getElementById('password').classList.remove('error');
      }

      if (!valido) return;

      setLoading(true);

      try {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });

        if (error) {
          mostrarAlertaLogin('Email o contraseña incorrectos. Verificá tus datos.');
          setLoading(false);
          return;
        }

        // Verificar que el usuario esté activo
        const { data: perfil, error: perfilError } = await sb
          .from('profiles')
          .select('activo, rol')
          .eq('id', data.user.id)
          .single();

        if (perfilError || !perfil || !perfil.activo) {
          await sb.auth.signOut();
          mostrarAlertaLogin('Tu cuenta está desactivada. Contactá al administrador.');
          setLoading(false);
          return;
        }

        // Redirigir al dashboard
        window.location.href = '/dashboard.html';

      } catch (err) {
        mostrarAlertaLogin('Error de conexión. Intentá nuevamente.');
        setLoading(false);
      }
    });
  </script>
</body>
</html>
